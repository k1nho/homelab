apiVersion: apps/v1
kind: Deployment
metadata:
  name: uptime-kuma
  labels:
    app.kubernetes.io/name: uptime-kuma
spec:
  revisionHistoryLimit: 2
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1 # Allow 1 extra pod during updates
      maxUnavailable: 0 # Ensure no pods are unavailable
  selector:
    matchLabels:
      app.kubernetes.io/name: uptime-kuma
  template:
    metadata:
      labels:
        app.kubernetes.io/name: uptime-kuma
    spec:
      serviceAccountName: uptime-kuma-sa
      automountServiceAccountToken: true
      dnsPolicy: ClusterFirst
      containers:
        - name: uptime-kuma
          image: louislam/uptime-kuma:2.2.1
          env:
            # Disable IPv6 to force IPv4 resolution
            - name: NODE_OPTIONS
              value: "--dns-result-order=ipv4first"
          ports:
            - name: http
              containerPort: 3001
              protocol: TCP
          volumeMounts:
            - name: storage
              mountPath: /app/data
          livenessProbe:
            httpGet:
              path: /
              port: 3001
            initialDelaySeconds: 180
            periodSeconds: 10
            timeoutSeconds: 2
            successThreshold: 1
          readinessProbe:
            httpGet:
              path: /
              port: 3001
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 1
            failureThreshold: 3
            successThreshold: 1
      volumes:
        - name: storage
          persistentVolumeClaim:
            claimName: uptime-kuma-pvc
