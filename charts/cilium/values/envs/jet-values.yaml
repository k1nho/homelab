# Configure as a kube-proxy replacement
kubeProxyReplacement: "true"

# IP Address Management Mode
ipam:
  mode: kubernetes

# Specify which network interfaces can run the eBPF datapath
devices: "enp1s0"

k8sServiceHost: "149.165.168.255"
k8sServicePort: 6443

# Cilium Operator Configuration
operator:
  replicas: 1

gatewayAPI:
  enabled: true
  hostNetwork:
    enabled: false

# L2 Announcements Configuration
l2announcements:
  enabled: false

# -- defaultLBServiceIPAM indicates the default LoadBalancer Service IPAM when
# no LoadBalancer class is set. Applicable values: lbipam, nodeipam, none
# Use nodeipam when running the non-openstack ccm setup to enable Cilium to assign
# external-ip from the nodes external ips (internal ips will be assigned if it does not find external ip)
defaultLBServiceIPAM: lbipam

# Node Ipam (enable with defaultLBServiceIPAM: nodeipam)
nodeIPAM:
  enabled: false

# k8 Client Rate Limit Configuration
k8sClientRateLimit:
  qps: 50
  burst: 200

# Hubble Configuration (observability)
hubble:
  relay:
    enabled: false
  ui:
    enabled: false

bpf:
  masquerade: true

tunnelProtocol: "vxlan"

enableIPv4Masquerade: true
