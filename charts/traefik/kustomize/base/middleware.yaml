apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: buffering
spec:
  buffering:
    maxRequestBodyBytes: 20971520 # 20 MiB
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: strip-common-prefixes
spec:
  stripPrefix:
    prefixes:
      - /default
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: basic-auth-middleware
  namespace: traefik
spec:
  basicAuth:
    secret: traefik-auth
    removeHeader: true
